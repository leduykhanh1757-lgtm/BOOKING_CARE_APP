<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
  <title>Booking care</title>
  <style>
    /* Ép tàng hình banner Google (Class bản cũ) */
    .goog-te-banner-frame.skiptranslate,
    .goog-te-banner-frame {
      display: none !important;
    }

    /* 🛠️ Ép tàng hình banner Google (Class bản cập nhật mới nhất) */
    iframe.skiptranslate,
    .VIpgJd-ZVi9od-ORHb-OEVmcd {
      display: none !important;
      visibility: hidden !important;
    }

    /* Chống Google tự động đẩy thẻ body xuống 40px */
    body {
      top: 0px !important;
      position: static !important;
    }

    /* Tắt viền xanh khó chịu khi hover vào chữ đã dịch */
    .goog-text-highlight {
      background-color: transparent !important;
      box-shadow: none !important;
    }

    /* Ẩn thẻ div công cụ mặc định */
    #google_translate_element {
      display: none !important;
    }
  </style>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  <div id="google_translate_element" style="display: none;"></div>

  <!-- Script cấu hình Google Translate -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'vi', // Ngôn ngữ gốc của web là Tiếng Việt
        includedLanguages: 'en,vi', // Chỉ hỗ trợ dịch ra tiếng Anh hoặc Việt
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>

  <!-- Nhúng thư viện của Google -->
  <script type="text/javascript"
    src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>

</html>
